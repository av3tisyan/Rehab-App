# Production (on-prem) stack. Same images as dev, hardened topology:
#   - Postgres is NOT exposed to the network (internal only).
#   - Caddy terminates HTTPS and is the only public entry point.
#   - A one-shot "init" service runs migrations + seed + admin bootstrap.
#
# Usage:
#   cp .env.prod.example .env   &&   edit .env (strong secrets, SITE_ADDRESS)
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No "ports:" — the database is reachable only on the internal network.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [internal]

  # One-shot: apply migrations, seed reference data, ensure an admin user.
  init:
    image: rehab-api:local
    command: >
      sh -c "node dist/db/migrate.js &&
             node dist/db/seed/index.js &&
             node dist/db/bootstrap.js"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      BOOTSTRAP_CLINIC_NAME: ${BOOTSTRAP_CLINIC_NAME}
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'
    networks: [internal]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: rehab-api:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-hy}
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    networks: [internal]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # No VITE_API_URL → the app calls the API at a relative /api via Caddy.
    restart: unless-stopped
    depends_on: [api]
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [api, web]
    networks: [internal]

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
